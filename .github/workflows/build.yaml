name: Build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Start Services
      uses: hoverkraft-tech/compose-action@v2.5.0

    - uses: actions/setup-go@v5
      with:
        go-version: "1.25"

    - name: Download Modules
      run: go mod download

    - name: Generate
      run: go generate ./...

    - name: Build
      env:
        GOOS: linux
        GOARCH: amd64
        CGO_ENABLED: "0"
      run: go build -ldflags="-X cas/version.GitCommit=${{ github.sha }} -X cas/version.Prerelease="""

    - name: Test
      env:
        AWS_ENDPOINT_URL: "http://localhost:8333"
        AWS_ACCESS_KEY_ID: admin
        AWS_SECRET_ACCESS_KEY: key
        AWS_REGION: eu-west-1
      run: go test -v ./...

    - name: Store Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cas
        path: cas

    - name: Generate Release Notes - Main
      if: ${{ github.ref_name == 'main' }}
      run: |
        echo "CAS_VERSION=$(./cas version --short)" >> "${GITHUB_ENV}"
        ./cas version --changelog --raw | tee release-notes.md

    - name: Generate Release Notes - Branch
      if: ${{ github.ref_name != 'main' }}
      run: |
        echo "CAS_VERSION=$(git rev-parse --short HEAD)" >> "${GITHUB_ENV}"
        ./cas version --changelog --raw | tee release-notes.md
  
    - name: Check if Changelog has changed
      uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          changelog:
            - 'changelog.md'

    - name: PreRelease
      if: ${{ github.ref_name != 'main' }}
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ env.CAS_VERSION }}
        tag_name: ${{ env.CAS_VERSION }}
        body_path: release-notes.md
        prerelease: true
        files: cas

    - name: Release
      if: ${{ github.ref_name == 'main' && steps.changes.outputs.changelog == 'true' }}
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.CAS_VERSION }}
        tag_name: ${{ env.CAS_VERSION }}
        body_path: release-notes.md
        files: cas
        overwrite_files: false
